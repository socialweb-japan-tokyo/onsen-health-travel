name: Weekly Article Generator

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜日 日本時間10時
  workflow_dispatch:      # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install anthropic

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py > article_entry.json

      - name: index.htmlを更新
        run: python scripts/update_index.py

      - name: GitHubにコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "自動記事追加 $(date +'%Y-%m-%d')"
          git push
