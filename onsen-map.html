</head>

  function latLngToPercent(lat, lng) {
    const latMax = 45.5, latMin = 30.0;
    const lngMin = 129.0, lngMax = 146.5;
    const x = ((lng - lngMin) / (lngMax - lngMin)) * 100;
    const y = ((latMax - lat) / (latMax - latMin)) * 100;
    return {x, y};
  }

    {name:"霧島温泉",pref:"鹿児島県",lat:31.90,lng:130.87,effect:"疲労回復・神経痛",desc:"坂本龍馬も訪れた温泉郷。"},
  ];

  const img = document.getElementById('mapImg');
  const svg = document.getElementById('pinSvg');
  const tooltip = document.getElementById('tooltip');
  const wrap = document.getElementById('mapWrap');

  function renderPins() {
    svg.innerHTML = '';
    const w = img.offsetWidth;
    const h = img.offsetHeight;
    onsenList.forEach(o => {
      const {x, y} = latLngToPercent(o.lat, o.lng);
      const cx = w * x / 100;
      const cy = h * y / 100;
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', 6);
      circle.setAttribute('fill', '#1a3a35');
      circle.setAttribute('stroke', '#5caa8a');
      circle.setAttribute('stroke-width', '2');
      circle.style.cursor = 'pointer';
      circle.addEventListener('mouseenter', (e) => {
        tooltip.innerHTML = `
          <div class="tooltip-title">♨ ${o.name}</div>
          <div class="tooltip-pref">${o.pref}</div>
          <div class="tooltip-effect">${o.effect}</div>
          <div class="tooltip-desc">${o.desc}</div>`;
        tooltip.style.display = 'block';
        const rect = wrap.getBoundingClientRect();
        const ex = e.clientX - rect.left;
        const ey = e.clientY - rect.top;
        tooltip.style.left = (ex + 12) + 'px';
        tooltip.style.top = (ey - 10) + 'px';
      });
      circle.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
      });
      svg.appendChild(circle);
    });
  }

  img.onload = renderPins;
  if (img.complete) renderPins();
  window.addEventListener('resize', renderPins);
  </script>
</body>
</html>
